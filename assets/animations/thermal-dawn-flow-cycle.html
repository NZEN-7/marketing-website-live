<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a; --orange: #E87C2A; --green: #2EC68A; --blue: #4A9CE8;
  --tag: rgba(255,255,255,0.45); --val: rgba(255,255,255,0.85); --rule: rgba(255,255,255,0.18);
}
html, body { background: var(--bg); margin: 0; padding: 0; height: 100%; overflow: hidden; }
body { display: flex; align-items: center; justify-content: center; height: 100%; }
.svg-wrap { width: 100%; max-width: 700px; }
svg { width: 100%; height: auto; overflow: visible; display: block; }

@keyframes pulse-flow {
  0%   { stroke-dashoffset: 200; opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { stroke-dashoffset: 0; opacity: 0; }
}
@keyframes glow-pulse  { 0%,100%{opacity:0.4} 50%{opacity:1} }
@keyframes window-glow { 0%,100%{fill:rgba(232,124,42,0.08)} 50%{fill:rgba(232,124,42,0.28)} }
@keyframes fan-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.flow-line { fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-width: 2.5; stroke-dasharray: 8 6; animation: pulse-flow 2.2s ease-in-out infinite; }
.flow-delay-1 { animation-delay: 0.4s; }
.flow-delay-2 { animation-delay: 0.8s; }
.flow-delay-3 { animation-delay: 1.2s; }
.flow-delay-4 { animation-delay: 1.6s; }
.glow-dot { animation: glow-pulse 1.8s ease-in-out infinite; }
.window    { animation: window-glow 3s ease-in-out infinite; }
.window-2  { animation-delay: 0.7s; }
.window-3  { animation-delay: 1.4s; }
.fan-blades { animation: fan-spin 1.6s linear infinite; transform-box: fill-box; transform-origin: center; }
.fan-blades.off { animation: none; }

.tag  { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.16em; fill: var(--tag); text-transform: uppercase; }
.val  { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 600; fill: var(--val); }
.temp { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; fill: rgba(255,255,255,0.55); }
.temp.muted { fill: rgba(255,255,255,0.2); }
.rule { stroke: var(--rule); stroke-width: 1; fill: none; }
.dot  { fill: rgba(255,255,255,0.5); }
</style>
</head>

<script>
(function() {
  // Cycle order: idle → charging → discharging, 5 seconds each.
  var CYCLE = ['idle', 'charging', 'discharging'];
  var INTERVAL_MS = 5000;
  var mode = CYCLE[0];

  function show(id, val) {
    var el = document.getElementById(id);
    if (el) el.style.opacity = val ? '1' : '0';
  }

  var COPY = {
    charging:    { label: 'Charging',    color: '#E87C2A',                hpOn: true,  battery: 'Charging'  },
    discharging: { label: 'Discharging', color: '#2EC68A',                hpOn: false, battery: 'Releasing' },
    direct:      { label: 'Direct Heat', color: '#E87C2A',                hpOn: true,  battery: 'Bypassed'  },
    idle:        { label: 'Idle',        color: 'rgba(255,255,255,0.5)',  hpOn: false, battery: 'Idle'      }
  };

  function applyState() {
    var d = COPY[mode];

    show('g-flow-charging',       mode === 'charging');
    show('g-flow-discharging',    mode === 'discharging');
    show('g-flow-direct',         mode === 'direct');
    show('g-flow-direct-behind',  mode === 'direct');

    show('hp-ring-1', d.hpOn);
    show('hp-ring-2', d.hpOn);
    show('hp-off-overlay', !d.hpOn);

    ['hp-fan-1','hp-fan-2'].forEach(function (id) {
      var el = document.getElementById(id);
      if (el) el.classList.toggle('off', !d.hpOn);
    });

    var chip = document.getElementById('lbl-mode-chip');
    chip.textContent = d.label;
    chip.setAttribute('fill', d.color);

    var hpVal = document.getElementById('lbl-hp-val');
    hpVal.textContent = d.hpOn ? 'On' : 'Off';
    hpVal.setAttribute('style', 'fill:' + (d.hpOn ? '#E87C2A' : 'rgba(255,255,255,0.4)'));

    var hpTemp = document.getElementById('lbl-hp-temp');
    if (hpTemp) {
      if (d.hpOn) {
        hpTemp.textContent = '57.8°C';
        hpTemp.classList.remove('muted');
      } else {
        hpTemp.textContent = '—';
        hpTemp.classList.add('muted');
      }
    }

    var bat = document.getElementById('lbl-battery-val');
    bat.textContent = d.battery;
    bat.setAttribute('style',
      mode === 'charging'    ? 'fill:#E87C2A' :
      mode === 'discharging' ? 'fill:#2EC68A' :
                               'fill:rgba(255,255,255,0.5)');

    var rad = document.getElementById('lbl-radiators-val');
    if (rad) {
      if (mode === 'discharging') {
        rad.textContent = 'On';
        rad.setAttribute('style', 'fill:#2EC68A');
      } else if (mode === 'direct') {
        rad.textContent = 'On';
        rad.setAttribute('style', 'fill:#E87C2A');
      } else {
        rad.textContent = 'Off';
        rad.removeAttribute('style');
      }
    }

    var sg = document.getElementById('store-glow-el');
    if (sg) {
      sg.setAttribute('fill',
        mode === 'charging'    ? 'url(#store-glow-o)' :
                                 'url(#store-glow-g)');
      sg.style.opacity = (mode === 'charging' || mode === 'discharging') ? '0.55' : '0';
    }
    var led = document.getElementById('store-led');
    if (led) {
      led.setAttribute('fill',
        mode === 'charging'    ? '#E87C2A' :
        mode === 'discharging' ? '#2EC68A' :
                                 '#555');
      led.setAttribute('opacity', (mode === 'idle' || mode === 'direct') ? '0.4' : '0.95');
    }
  }

  var idx = 0;
  applyState();
  setInterval(function () {
    idx = (idx + 1) % CYCLE.length;
    mode = CYCLE[idx];
    applyState();
  }, INTERVAL_MS);
})();
</script>
</body>
</html>
