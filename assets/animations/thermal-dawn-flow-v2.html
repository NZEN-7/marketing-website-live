<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Thermal Dawn — System Flow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@500;600&family=Inter:wght@500;600&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a; --orange: #E87C2A; --green: #2EC68A; --blue: #4A9CE8;
  --tag: rgba(255,255,255,0.45); --val: rgba(255,255,255,0.85); --rule: rgba(255,255,255,0.18);
}
html, body { background: var(--bg); margin: 0; padding: 0; overflow-x: hidden; }
body { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100%; }
/* Fill the frame width; the viewBox is tuned to the card's aspect so overflow is
   clipped (crops the sides) rather than letterboxed. */
.svg-wrap { width: 100%; }
svg { display: block; width: 100%; height: auto; overflow: hidden; }

/* ── standalone controls (marketing embed only) ───────────────────────
   In the Home Assistant dashboard this file is driven by postMessage from
   branding.js and these controls stay hidden. On the website there is no
   bridge, so they drive the same state machine directly. */
/* Controls are opt-in (`?controls=1`). By default the scene just cycles. */
.controls { display: none; width: 100%; padding: 14px 16px 4px; flex-direction: column; gap: 10px; align-items: center; }
body.show-controls .controls { display: flex; }
/* The viewBox is portrait (363×430), tuned for a narrow HA dashboard card.
   Left to fill a wide marketing embed it grows absurdly tall, so cap it. */
body.standalone .svg-wrap { max-width: 540px; margin: 0 auto; }
.ctl-row { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; align-items: center; }
.ctl-label { font-family: 'DM Mono', ui-monospace, monospace; font-size: 10px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase; color: rgba(255,255,255,.38); margin-right: 2px; }
/* matches .tod-btn in homepage_web_animation_new.html so the two embeds
   read as the same control system */
.ctl-btn {
  padding: 8px 18px; border-radius: 6px; border: 1px solid rgba(255,255,255,.1);
  background: transparent; color: rgba(255,255,255,.55);
  font-family: 'DM Mono', ui-monospace, monospace; font-size: 11px; font-weight: 600;
  letter-spacing: .08em; text-transform: uppercase; cursor: pointer; transition: all .2s;
}
.ctl-btn:hover { border-color: rgba(255,255,255,.3); color: rgba(255,255,255,.9); }
.ctl-btn:focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; }
.ctl-btn[aria-pressed="true"] { border-color: #E87C2A55; background: #E87C2A18; color: var(--orange); }
.ctl-btn[aria-pressed="true"].is-green { border-color: #2EC68A55; background: #2EC68A18; color: var(--green); }
@media (max-width: 560px) {
  .ctl-label { display: none; }
  .ctl-btn { padding: 6px 10px; font-size: 9.5px; }
}

/* ── system flow / scene (unchanged from production) ──────────────── */
@keyframes pulse-flow {
  0%   { stroke-dashoffset: 200; opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { stroke-dashoffset: 0; opacity: 0; }
}
@keyframes glow-pulse  { 0%,100%{opacity:0.4} 50%{opacity:1} }
@keyframes window-glow { 0%,100%{fill:rgba(232,124,42,0.08)} 50%{fill:rgba(232,124,42,0.28)} }
@keyframes fan-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.flow-line { fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-width: 2.5; stroke-dasharray: 8 6; animation: pulse-flow 2.2s ease-in-out infinite; }
.flow-delay-1 { animation-delay: 0.4s; }
.flow-delay-2 { animation-delay: 0.8s; }
.flow-delay-3 { animation-delay: 1.2s; }
.flow-delay-4 { animation-delay: 1.6s; }
.glow-dot { animation: glow-pulse 1.8s ease-in-out infinite; }
.window    { animation: window-glow 3s ease-in-out infinite; }
.fan-blades { animation: fan-spin 1.6s linear infinite; transform-box: fill-box; transform-origin: center; }
.fan-blades.off { animation: none; }

.tag  { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.16em; fill: var(--tag); text-transform: uppercase; }
.val  { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 600; fill: var(--val); }
.temp { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; fill: rgba(255,255,255,0.55); }
.temp.muted { fill: rgba(255,255,255,0.2); }
.rule { stroke: var(--rule); stroke-width: 1; fill: none; }
.dot  { fill: rgba(255,255,255,0.5); }

/* ── weather / sky layers (NEW — under test) ─────────────────────── */
/* Sky layers crossfade; stars / moon / sun / clouds fade rather than pop. */
.sky-fade { transition: opacity 1.2s ease; }
/* Drift: outer <g> positions the cloud, inner <g.cloud-move> drifts it. */
@keyframes cloud-drift { from { transform: translateX(-16px); } to { transform: translateX(16px); } }
.cloud-move { animation: cloud-drift 46s ease-in-out infinite alternate; }
.cloud-move.c2 { animation-duration: 62s; animation-delay: -10s; }
.cloud-move.c3 { animation-duration: 54s; animation-delay: -26s; }
/* gentle wobble (nested so it composes with the horizontal drift) */
@keyframes cloud-wobble { 0%,100%{ transform: translateY(0) rotate(0deg); } 50%{ transform: translateY(3.5px) rotate(0.5deg); } }
.cloud-wobble { transform-box: fill-box; transform-origin: 50% 50%; animation: cloud-wobble 8s ease-in-out infinite; }
.cloud-wobble.w2 { animation-duration: 11s; animation-delay: -3.5s; }

/* Rain: two depth layers of slanted streaks; per-drop stroke-opacity sets
   brightness (keyframes animate opacity 0→1→0, the two multiply) and inline
   duration/delay vary the fall speed so it never reads as a repeating sheet. */
@keyframes rain-fall {
  0%   { transform: translateY(-40px); opacity: 0; }
  8%   { opacity: 1; }
  82%  { opacity: 1; }
  100% { transform: translateY(420px); opacity: 0; }
}
.raindrop { animation: rain-fall 0.9s linear infinite; }

@keyframes twinkle { 0%,100%{opacity:0.25} 50%{opacity:0.95} }
.star { animation: twinkle 3.6s ease-in-out infinite; }

/* Storm flash — brief, occasional double-strike across the sky. */
@keyframes lightning { 0%,92%,100%{opacity:0} 93%{opacity:0.8} 94%{opacity:0.05} 95%{opacity:0.55} 96%{opacity:0} }
.lightning-flash { animation: lightning 9s linear infinite; }

.hide { display: none !important; }
</style>
</head>
<body>

<div class="controls" id="controls">
  <div class="ctl-row" role="group" aria-label="System mode">
    <span class="ctl-label">System</span>
    <button class="ctl-btn" type="button" data-mode="charging" aria-pressed="false">☀ Charging</button>
    <button class="ctl-btn is-green" type="button" data-mode="discharging" aria-pressed="false">🏠 Discharging</button>
    <button class="ctl-btn" type="button" data-mode="direct" aria-pressed="false">Direct heat</button>
    <button class="ctl-btn" type="button" data-mode="idle" aria-pressed="false">Idle</button>
  </div>
  <div class="ctl-row" role="group" aria-label="Time of day and weather">
    <span class="ctl-label">Sky</span>
    <button class="ctl-btn" type="button" data-tod="dawn" aria-pressed="false">Dawn</button>
    <button class="ctl-btn" type="button" data-tod="day" aria-pressed="false">Day</button>
    <button class="ctl-btn" type="button" data-tod="dusk" aria-pressed="false">Dusk</button>
    <button class="ctl-btn" type="button" data-tod="night" aria-pressed="false">Night</button>
    <button class="ctl-btn" type="button" data-wx="clear" aria-pressed="false">Clear</button>
    <button class="ctl-btn" type="button" data-wx="overcast" aria-pressed="false">Overcast</button>
    <button class="ctl-btn" type="button" data-wx="rain" aria-pressed="false">Rain</button>
  </div>
</div>

<div class="svg-wrap">
<svg viewBox="235 18 363 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-orange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cloud-blur" x="-30%" y="-120%" width="160%" height="340%"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="moon-soft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="1.4"/></filter>

    <!-- Sky gradients per time-of-day (swapped on the sky rect by JS) -->
    <linearGradient id="sky-day"   x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#27537a"/><stop offset="30%" stop-color="#16344c"/><stop offset="54%" stop-color="#0a0a0a"/></linearGradient>
    <linearGradient id="sky-dusk"  x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9c5526"/><stop offset="28%" stop-color="#4f2f26"/><stop offset="50%" stop-color="#0c0a12"/></linearGradient>
    <linearGradient id="sky-night" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#05070e"/><stop offset="100%" stop-color="#0a0a0a"/></linearGradient>

    <radialGradient id="sun-core" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ffd9a0"/><stop offset="45%" stop-color="#E87C2A"/><stop offset="100%" stop-color="#E87C2A" stop-opacity="0"/></radialGradient>
    <radialGradient id="moon-core" cx="42%" cy="40%" r="60%"><stop offset="0%" stop-color="#eef2f7"/><stop offset="100%" stop-color="#aeb6c2"/></radialGradient>

    <!-- existing scene gradients -->
    <linearGradient id="wall-grad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2c2c30"/><stop offset="100%" stop-color="#26262a"/></linearGradient>
    <linearGradient id="roof-grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#28282c"/><stop offset="100%" stop-color="#232328"/></linearGradient>
    <linearGradient id="roof-grad-back" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1c1c20"/><stop offset="100%" stop-color="#18181c"/></linearGradient>
    <linearGradient id="steel-grad"    x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8a8d94"/><stop offset="50%" stop-color="#65686e"/><stop offset="100%" stop-color="#4a4d52"/></linearGradient>
    <linearGradient id="steel-side"    x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4a4d52"/><stop offset="100%" stop-color="#34373c"/></linearGradient>
    <linearGradient id="steel-top"     x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#9a9da4"/><stop offset="100%" stop-color="#70737a"/></linearGradient>
    <linearGradient id="slat-grad"     x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0c0c0e"/><stop offset="100%" stop-color="#1a1a1c"/></linearGradient>
    <linearGradient id="slat-side-grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#202022"/><stop offset="100%" stop-color="#141416"/></linearGradient>
    <linearGradient id="hp-front-grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2a2a2c"/><stop offset="100%" stop-color="#171719"/></linearGradient>
    <linearGradient id="hp-side-grad"  x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1f1f21"/><stop offset="100%" stop-color="#141416"/></linearGradient>
    <linearGradient id="hp-top-grad"   x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2c2c2e"/><stop offset="100%" stop-color="#1d1d1f"/></linearGradient>
    <linearGradient id="pad-grad"      x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#36363c"/><stop offset="100%" stop-color="#2c2c34"/></linearGradient>
    <linearGradient id="panel-grad"    x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a1118"/><stop offset="100%" stop-color="#070b10"/></linearGradient>
    <!-- lithium battery (cool slate, distinct from the warm thermal store) -->
    <linearGradient id="batt-front"  x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7f858e"/><stop offset="100%" stop-color="#636972"/></linearGradient>
    <linearGradient id="batt-side"   x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#666c75"/><stop offset="100%" stop-color="#4e545d"/></linearGradient>
    <linearGradient id="batt-top"    x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#90969e"/><stop offset="100%" stop-color="#767c84"/></linearGradient>
    <!-- ground pool — faint cool sheen the buildings sit on (dark bg, so grounding
         comes from light behind the silhouette, not a dark shadow) -->
    <radialGradient id="ground-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#35485c" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#243342" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#1a2530" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="store-glow-o" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#E87C2A" stop-opacity="0.5"/><stop offset="100%" stop-color="#E87C2A" stop-opacity="0"/></radialGradient>
    <radialGradient id="store-glow-g" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#2EC68A" stop-opacity="0.55"/><stop offset="100%" stop-color="#2EC68A" stop-opacity="0"/></radialGradient>
  </defs>

  <!-- ══ SKY — three stacked layers crossfaded by JS (day base; dusk amount ramps
       continuously with the sun's distance from the horizon; night on top) ══ -->
  <rect x="235" y="0" width="363" height="548" fill="url(#sky-day)"/>
  <rect id="sky-dusk-rect" class="sky-fade" x="235" y="0" width="363" height="548" fill="url(#sky-dusk)" style="opacity:0"/>
  <rect id="sky-night-rect" class="sky-fade" x="235" y="0" width="363" height="548" fill="url(#sky-night)" style="opacity:0"/>

  <!-- ══ STARS (night) — a gentle "star river" wave. Varied dot sizes give a
       hand-placed, dot-painting feel; the few faint concentric-halo dots are a
       quiet nod to that style, kept abstract + subtle (not any specific motif). ══ -->
  <g id="sky-stars" class="sky-fade" style="opacity:0" fill="#e2e8f0">
    <circle class="star" cx="246" cy="66" r="0.8" style="animation-delay:-0.3s"/>
    <circle class="star" cx="272" cy="56" r="1.3" style="animation-delay:-1.5s"/>
    <circle class="star" cx="298" cy="50" r="0.7" style="animation-delay:-2.7s"/>
    <circle class="star" cx="350" cy="52" r="0.8" style="animation-delay:-0.9s"/>
    <circle class="star" cx="376" cy="58" r="1.0" style="animation-delay:-3.2s"/>
    <circle class="star" cx="402" cy="54" r="0.7" style="animation-delay:-1.9s"/>
    <circle class="star" cx="430" cy="46" r="1.2" style="animation-delay:-0.6s"/>
    <circle class="star" cx="486" cy="48" r="0.8" style="animation-delay:-2.3s"/>
    <circle class="star" cx="514" cy="56" r="1.0" style="animation-delay:-1.2s"/>
    <circle class="star" cx="542" cy="62" r="0.7" style="animation-delay:-3.0s"/>
    <circle class="star" cx="568" cy="56" r="1.3" style="animation-delay:-0.5s"/>
    <circle class="star" cx="591" cy="52" r="0.8" style="animation-delay:-2.6s"/>
    <circle class="star" cx="594" cy="64" r="0.9" style="animation-delay:-1.7s"/>
    <!-- tiny fillers for texture -->
    <circle class="star" cx="288" cy="72" r="0.5" style="animation-delay:-1.1s"/>
    <circle class="star" cx="414" cy="40" r="0.5" style="animation-delay:-2.8s"/>
    <circle class="star" cx="530" cy="70" r="0.5" style="animation-delay:-0.4s"/>
    <circle class="star" cx="582" cy="40" r="0.5" style="animation-delay:-2.1s"/>
    <!-- subtle halo accents (faint concentric ring) -->
    <g class="star" style="animation-delay:-0.8s">
      <circle cx="324" cy="46" r="1.4"/>
      <circle cx="324" cy="46" r="4.0" fill="none" stroke="#e2e8f0" stroke-width="0.4" opacity="0.3"/>
    </g>
    <g class="star" style="animation-delay:-2.4s">
      <circle cx="458" cy="42" r="1.5"/>
      <circle cx="458" cy="42" r="4.4" fill="none" stroke="#e2e8f0" stroke-width="0.4" opacity="0.3"/>
    </g>
    <g class="star" style="animation-delay:-1.4s">
      <circle cx="586" cy="48" r="1.4"/>
      <circle cx="586" cy="48" r="4.0" fill="none" stroke="#e2e8f0" stroke-width="0.4" opacity="0.3"/>
    </g>
  </g>

  <!-- ══ SUN (day / dusk) — soft abstract concentric glow, top-right ══ -->
  <g id="sky-sun" class="sky-fade">
    <circle cx="570" cy="40" r="42" fill="#E87C2A" opacity="0.05"/>
    <circle cx="570" cy="40" r="29" fill="#E87C2A" opacity="0.10"/>
    <circle cx="570" cy="40" r="17" fill="#E87C2A" opacity="0.20"/>
    <circle id="sun-disk" cx="570" cy="40" r="8.5" fill="#E87C2A" opacity="0.65"/>
  </g>

  <!-- ══ MOON (night) ══ -->
  <g id="sky-moon" class="sky-fade" style="opacity:0">
    <circle cx="570" cy="40" r="22" fill="#cdd5e0" opacity="0.12" filter="url(#moon-soft)"/>
    <circle cx="570" cy="40" r="12" fill="url(#moon-core)"/>
    <circle cx="576" cy="36" r="11" fill="#0a0a0a" opacity="0.92"/>
    <circle cx="565" cy="44" r="1.4" fill="#9aa3b0" opacity="0.5"/>
    <circle cx="568" cy="38" r="1.0" fill="#9aa3b0" opacity="0.5"/>
  </g>

  <!-- ══ CLOUDS (partly / overcast / rain / storm) — soft blurred stratus wisps:
       flat ellipse clusters at low opacity, drifting slowly. data-op is the base
       opacity; applyWX() darkens + densifies with heavier cover. The extra wrap
       is a wide full-width layer that fades in for overcast / rain / storm. ══ -->
  <g id="sky-clouds" class="sky-fade" style="opacity:0">
    <g class="cloud-move"><g class="cloud-wobble">
      <g class="cloud" data-op="0.16" filter="url(#cloud-blur)" fill="#aab2bd" opacity="0.16">
        <ellipse cx="330" cy="70" rx="58" ry="8"/>
        <ellipse cx="362" cy="61" rx="36" ry="6.5"/>
        <ellipse cx="300" cy="63" rx="28" ry="5.5"/>
      </g>
    </g></g>
    <g class="cloud-move c2"><g class="cloud-wobble w2">
      <g class="cloud" data-op="0.13" filter="url(#cloud-blur)" fill="#aab2bd" opacity="0.13">
        <ellipse cx="490" cy="94" rx="62" ry="9"/>
        <ellipse cx="528" cy="85" rx="38" ry="6.5"/>
        <ellipse cx="456" cy="87" rx="30" ry="5.5"/>
      </g>
    </g></g>
    <g id="cloud-extra-wrap" class="sky-fade" style="opacity:0">
      <g class="cloud-move c3"><g class="cloud-wobble">
        <g class="cloud" data-op="0.22" filter="url(#cloud-blur)" fill="#959dab" opacity="0.22">
          <ellipse cx="420" cy="46" rx="150" ry="11"/>
          <ellipse cx="300" cy="38" rx="90" ry="9"/>
          <ellipse cx="540" cy="40" rx="90" ry="9"/>
          <ellipse cx="430" cy="62" rx="100" ry="8"/>
        </g>
      </g></g>
    </g>
  </g>

  <!-- Whole foreground scene scaled to 0.8 about the frame centre (444.5,274), so the
       house / store / heat pump / battery (and their callouts + flow) sit 20% smaller
       within the window. Sky, sun, clouds and rain stay full-frame (outside this group). -->
  <g id="scene-scale" transform="translate(444.5,274) scale(0.8) translate(-444.5,-274)">

  <!-- ground pool under the whole footprint; buildings draw on top of it -->
  <ellipse id="ground-pool" cx="420" cy="380" rx="320" ry="70" fill="url(#ground-glow)"/>

  <!-- ══ Two-storey house BEHIND the garage (taller; peeks above the garage's left
       roofline, left side runs off the frame). Drawn first so the garage sits in
       front of it. Rough first massing — refine after screenshot. ══ -->
  <g transform="translate(345,360) scale(0.85) translate(-345,-360)">
    <!-- right side wall (mostly hidden behind the garage) -->
    <polygon points="345,360 575,231 575,91 345,220" fill="#25252a" stroke="#3a3a3e" stroke-width="0.5"/>

    <polygon points="345,360 140,245 140,105 242.5,92.5 345,220" fill="url(#wall-grad)" stroke="#2a2a2c" stroke-width="0.5"/>
    <!-- rake/eave shadows on the walls — deeper now the roof overhangs; the top
         of each band hides behind the slab + fascia -->
    <polygon points="140,105 242.5,92.5 242.5,104.5 140,117" fill="#000" opacity="0.35"/>
    <polygon points="242.5,92.5 345,220 345,238 242.5,110.5" fill="#000" opacity="0.35"/>
    <polygon points="345,220 575,91 575,108 345,237" fill="#000" opacity="0.35"/>
    <!-- roof slabs, overhanging the walls: front rake by 5 along -v, eaves by 6
         down-slope. Right roof slope, then left. -->
    <polygon points="238.1,95 344.4,227.2 578.8,95.7 472.5,-36.5" fill="url(#roof-grad)" stroke="#2a2a2c" stroke-width="0.5"/>
    <polygon points="129.6,108.2 238.1,95 472.5,-36.5 364,-23.3" fill="url(#roof-grad-back)" stroke="#2a2a2c" stroke-width="0.5"/>
    <!-- fascia (slab thickness 4.5): front rakes face -v, right eave faces -u (darker) -->
    <polygon points="129.6,108.2 238.1,95 238.1,99.5 129.6,112.7" fill="#1c1c20"/>
    <polygon points="238.1,95 344.4,227.2 344.4,231.7 238.1,99.5" fill="#1c1c20"/>
    <polygon points="344.4,227.2 578.8,95.7 578.8,100.2 344.4,231.7" fill="#121215"/>
    <!-- front door — recessed into the wall: opening quad is the (set-back) panel,
         left jamb + sill strips give the reveal depth (recess shift = 4.4,-2.4 along
         the side-wall axis). Seam sits on the recessed panel's centre. -->
    <polygon points="238.9,300.5 214.3,286.7 214.3,233.5 238.9,247.3" fill="#0c0c10" stroke="#54545c" stroke-width="0.7"/>

  <!-- Title pinned to the top of the frame (outside the scene scale, so full size). -->
  <g>
    <text x="253" y="40" text-anchor="start" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.5)" letter-spacing="0.08em">My Home</text>
    <text id="lbl-mode-chip" x="253" y="66" text-anchor="start" font-family="Inter,sans-serif" font-size="22" font-weight="600" fill="#2EC68A">Idle</text>
  </g>

  <!-- Outdoor readout — top-right sky pocket, just above the garage roof -->
  <g id="outdoor-readout">
    <text x="593" y="112" class="tag" text-anchor="end">Outdoor</text>
    <text id="lbl-outdoor-temp" x="593" y="131" class="val" text-anchor="end">14.0°C</text>
    <text id="lbl-outdoor-cond" x="593" y="149" class="temp" text-anchor="end">Clear</text>
  </g>

  <!-- ══ RAIN (rain / storm) — drawn last so it falls in front. Near layer:
       longer, brighter, faster; far layer: thinner, dimmer, slower. ══ -->
  <g id="sky-rain" class="hide" stroke="#8fa3bd" stroke-linecap="round">
    <g stroke-width="0.9">
      <line class="raindrop" x1="262" y1="0" x2="257" y2="16" stroke-opacity="0.42" style="animation-duration:0.78s;animation-delay:-0.12s"/>
      <line class="raindrop" x1="308" y1="0" x2="303" y2="16" stroke-opacity="0.34" style="animation-duration:0.88s;animation-delay:-0.51s"/>
      <line class="raindrop" x1="354" y1="0" x2="349" y2="16" stroke-opacity="0.45" style="animation-duration:0.74s;animation-delay:-0.33s"/>
      <line class="raindrop" x1="401" y1="0" x2="396" y2="16" stroke-opacity="0.36" style="animation-duration:0.92s;animation-delay:-0.70s"/>
      <line class="raindrop" x1="447" y1="0" x2="442" y2="16" stroke-opacity="0.44" style="animation-duration:0.76s;animation-delay:-0.05s"/>
      <line class="raindrop" x1="493" y1="0" x2="488" y2="16" stroke-opacity="0.35" style="animation-duration:0.86s;animation-delay:-0.58s"/>
      <line class="raindrop" x1="539" y1="0" x2="534" y2="16" stroke-opacity="0.43" style="animation-duration:0.80s;animation-delay:-0.26s"/>
      <line class="raindrop" x1="584" y1="0" x2="579" y2="16" stroke-opacity="0.37" style="animation-duration:0.90s;animation-delay:-0.44s"/>
    </g>
    <g stroke-width="0.6">
      <line class="raindrop" x1="285" y1="0" x2="282" y2="11" stroke-opacity="0.20" style="animation-duration:1.12s;animation-delay:-0.31s"/>
      <line class="raindrop" x1="331" y1="0" x2="328" y2="11" stroke-opacity="0.16" style="animation-duration:1.22s;animation-delay:-0.77s"/>
      <line class="raindrop" x1="377" y1="0" x2="374" y2="11" stroke-opacity="0.21" style="animation-duration:1.06s;animation-delay:-0.15s"/>
      <line class="raindrop" x1="424" y1="0" x2="421" y2="11" stroke-opacity="0.17" style="animation-duration:1.18s;animation-delay:-0.62s"/>
      <line class="raindrop" x1="470" y1="0" x2="467" y2="11" stroke-opacity="0.20" style="animation-duration:1.08s;animation-delay:-0.92s"/>
      <line class="raindrop" x1="516" y1="0" x2="513" y2="11" stroke-opacity="0.16" style="animation-duration:1.24s;animation-delay:-0.48s"/>
      <line class="raindrop" x1="562" y1="0" x2="559" y2="11" stroke-opacity="0.21" style="animation-duration:1.10s;animation-delay:-0.20s"/>
      <line class="raindrop" x1="592" y1="0" x2="589" y2="11" stroke-opacity="0.15" style="animation-duration:1.20s;animation-delay:-0.85s"/>
    </g>
  </g>

  <!-- ══ LIGHTNING (storm) ══ -->
  <g id="sky-lightning" class="hide">
    <rect class="lightning-flash" x="235" y="0" width="363" height="548" fill="#cfe0ff" opacity="0"/>
  </g>
</svg>
</div>

<script>
(function() {
  var MODES = ['charging','discharging','direct','idle'];
  var TODS  = ['day','dawn','dusk','night'];
  var WXS   = ['clear','partly','overcast','rain','storm'];
  var params = new URLSearchParams(window.location.search);
  var state = {
    mode:   MODES.includes(params.get('mode')) ? params.get('mode') : 'idle',
    tod: 'day', wx: 'clear', outdoor: null, sunManual: null
  };

  function show(id, on) { var el = document.getElementById(id); if (el) el.style.opacity = on ? '1' : '0'; }
  function setHidden(id, hidden) { var el = document.getElementById(id); if (el) el.classList.toggle('hide', hidden); }

  // ── system mode (same logic as production) ──
  var COPY = {
    charging:    { label: 'Charging',    color: '#E87C2A',               hpOn: true,  battery: 'Charging'  },
    discharging: { label: 'Discharging', color: '#2EC68A',               hpOn: false, battery: 'Releasing' },
    direct:      { label: 'Direct Heat', color: '#E87C2A',               hpOn: true,  battery: 'Secondary' },
    idle:        { label: 'Idle',        color: 'rgba(255,255,255,0.5)', hpOn: false, battery: 'Idle'      }
  };
  function applyMode() {
    var d = COPY[state.mode];
    var direct = state.mode === 'direct';
    ['g-flow-home', 'g-flow-home-2'].forEach(function (id) {
      var g = document.getElementById(id);
      g.style.opacity = (state.mode === 'discharging' || direct) ? '1' : '0';
      g.style.setProperty('--flow-main', direct ? 'var(--orange)' : 'var(--green)');
    });
    show('g-flow-hp', state.mode === 'charging' || direct);
    show('hp-ring-1', d.hpOn); show('hp-ring-2', d.hpOn); show('hp-off-overlay', !d.hpOn);
    ['hp-fan-1','hp-fan-2'].forEach(function (id){ var el=document.getElementById(id); if(el) el.classList.toggle('off', !d.hpOn); });
    var chip = document.getElementById('lbl-mode-chip'); chip.textContent = d.label; chip.setAttribute('fill', d.color);
    var hpVal = document.getElementById('lbl-hp-val'); hpVal.textContent = d.hpOn ? 'On' : 'Off';
    hpVal.setAttribute('style', 'fill:' + (d.hpOn ? '#E87C2A' : 'rgba(255,255,255,0.4)'));
    var bat = document.getElementById('lbl-battery-val'); bat.textContent = d.battery;
    bat.setAttribute('style', state.mode==='charging'?'fill:#E87C2A':state.mode==='discharging'?'fill:#2EC68A':'fill:rgba(255,255,255,0.5)');
    var rad = document.getElementById('lbl-radiators-val');
    if (state.mode==='discharging'){rad.textContent='On';rad.setAttribute('style','fill:#2EC68A');}
    else if (state.mode==='direct'){rad.textContent='On';rad.setAttribute('style','fill:#E87C2A');}
    else {rad.textContent='Off';rad.removeAttribute('style');}
    var sg = document.getElementById('store-glow-el');
    if (sg){ sg.setAttribute('fill', state.mode==='charging'?'url(#store-glow-o)':'url(#store-glow-g)');
      sg.style.opacity = (state.mode==='charging'||state.mode==='discharging')?'0.55':'0'; }
  }

  // ── sun arc across the sky (moves with time of day) ──
  // frac 0 = sunrise (left, low) · 0.5 = midday (top) · 1 = sunset (right, low).
  var SUN_X0 = 250, SUN_X1 = 575;       // horizon x at sunrise / sunset
  var SUN_Y_TOP = 22, SUN_Y_LOW = 96;   // y at midday / near the horizon
  function sunFrac() {
    // Time-of-day slider overrides everything when dragged.
    if (state.sunManual != null) return state.sunManual;
    // dawn/dusk buttons preview the ends; 'day' tracks the real clock so the sun
    // sweeps across the sky through the day (06:00→18:00 daylight window).
    if (state.tod === 'dawn') return 0.12;
    if (state.tod === 'dusk') return 0.88;
    var d = new Date(), h = d.getHours() + d.getMinutes() / 60;
    return Math.max(0.05, Math.min(0.95, (h - 6) / 12));
  }
  function positionSun() {
    var g = document.getElementById('sky-sun');
    if (!g) return;
    var f = sunFrac(), t = 2 * f - 1;
    var x = SUN_X0 + f * (SUN_X1 - SUN_X0);
    var y = SUN_Y_TOP + (SUN_Y_LOW - SUN_Y_TOP) * (t * t);   // parabolic arc
    g.setAttribute('transform', 'translate(' + (x - 570).toFixed(1) + ',' + (y - 40).toFixed(1) + ')');
  }

  // ── time of day ──
  function applyTOD() {
    var night = state.tod === 'night';
    // Duskiness ramps continuously with the sun's distance from the horizon
    // (full golden below m=0.10, fading out by m=0.25) — no hard hue steps.
    var f = sunFrac(), m = Math.min(f, 1 - f);
    var dusk = night ? 0 : Math.max(0, Math.min(1, 1 - (m - 0.10) / 0.15));
    document.getElementById('sky-dusk-rect').style.opacity = dusk.toFixed(2);
    document.getElementById('sky-night-rect').style.opacity = night ? '1' : '0';
    document.getElementById('sky-stars').style.opacity = night ? '1' : '0';
    document.getElementById('sky-moon').style.opacity = night ? '1' : '0';
    if (!night) positionSun();
    // Warmer sun near the horizon.
    var disk = document.getElementById('sun-disk');
    if (disk) disk.setAttribute('fill', dusk > 0.5 ? '#E8662A' : '#E87C2A');
    applyWX(); // sun visibility depends on tod too
  }

  // ── weather ──
  function applyWX() {
    var w = state.wx;
    var cloudy   = (w === 'partly' || w === 'overcast' || w === 'rain' || w === 'storm');
    var raining  = (w === 'rain' || w === 'storm');
    var storm    = (w === 'storm');
    var overcast = (w === 'overcast' || raining);

    document.getElementById('sky-clouds').style.opacity = cloudy ? '1' : '0';
    setHidden('sky-rain', !raining);
    setHidden('sky-lightning', !storm);

    // wide extra layer fades in for heavier cover
    document.getElementById('cloud-extra-wrap').style.opacity = overcast ? '1' : '0';

    // darken + densify the cloud banks with cover
    document.querySelectorAll('#sky-clouds .cloud').forEach(function(c){
      c.setAttribute('fill', storm ? '#6f7782' : overcast ? '#838b96' : '#aab2bd');
      c.setAttribute('opacity', (parseFloat(c.dataset.op) * (storm ? 2.2 : overcast ? 1.8 : 1)).toFixed(2));
    });

    // sun fades out at night and dims behind cover
    var sun = document.getElementById('sky-sun');
    if (sun) sun.style.opacity = state.tod === 'night' ? '0' : overcast ? '0.35' : '1';

    var cond = document.getElementById('lbl-outdoor-cond');
    if (cond) cond.textContent = {clear:'Clear',partly:'Partly cloudy',overcast:'Overcast',rain:'Rain',storm:'Storm'}[w];
  }

  function applyOutdoor() {
    var el = document.getElementById('lbl-outdoor-temp');
    if (el) el.textContent = (state.outdoor == null) ? '—' : state.outdoor.toFixed(1) + '°C';
  }

  // ── live system temps (next to the labels) ──
  function setTemp(id, val, forceMuted) {
    var el = document.getElementById(id);
    if (!el) return;
    var n = (val == null) ? NaN : parseFloat(val);
    if (forceMuted || isNaN(n)) { el.textContent = '—'; el.classList.add('muted'); }
    else { el.textContent = n.toFixed(1) + '°C'; el.classList.remove('muted'); }
  }

  // ── live data from the dashboard bridge (branding.js) ──
  window.addEventListener('message', function(e) {
    if (!e.data) return;
    if (e.data.type === 'setMode' && MODES.includes(e.data.mode)) {
      state.mode = e.data.mode; applyMode();
    }
    if (e.data.type === 'setTemps') {
      setTemp('lbl-battery-temp', e.data.tank, false);
      setTemp('lbl-hp-temp',      e.data.supply, e.data.supply == null);
      setTemp('lbl-radiators-temp', e.data.living, false);
    }
    if (e.data.type === 'setEnv') {
      if (TODS.includes(e.data.tod)) state.tod = e.data.tod;
      if (WXS.includes(e.data.wx))   state.wx  = e.data.wx;
      if ('outdoor' in e.data) state.outdoor = (e.data.outdoor == null ? null : parseFloat(e.data.outdoor));
      applyTOD();      // also runs applyWX()
      applyOutdoor();
    }
  });

  // Tell the bridge we're ready so it pushes current state immediately.
  if (window.parent !== window) {
    try { window.parent.postMessage({ type: 'thermalDawnReady' }, '*'); } catch (e) {}
  }

  applyMode(); applyTOD(); applyWX(); applyOutdoor();
  // Keep the sun creeping across the sky through the day without a reload.
  setInterval(function(){ if (state.tod !== 'night') positionSun(); }, 60000);

  /* ── standalone mode (marketing embed) ──────────────────────────────
     Inside the HA dashboard the parent bridge drives everything, so we
     leave well alone. Embedded on the website there is no bridge, so the
     scene would sit frozen on 'idle'. Detect that and take over: expose
     the control bar, run a narrated demo loop, and hand control to the
     visitor the moment they press anything.
     `?standalone=0` forces the bridged behaviour; `?standalone=1` forces
     the controls (useful for testing inside HA).                      */
  // Being inside an iframe proves nothing — the HA dashboard is an iframe
  // too. So assume standalone and stand down the moment a real bridge
  // speaks (the listener below clears the controls and the demo loop).
  var forced = params.get('standalone');
  var standalone = forced !== '0';

  var heardFromBridge = false;
  window.addEventListener('message', function (e) {
    if (e.data && (e.data.type === 'setMode' || e.data.type === 'setEnv' || e.data.type === 'setTemps')) {
      heardFromBridge = true;
      if (demoTimer) { clearInterval(demoTimer); demoTimer = null; }
      document.body.classList.remove('standalone');
    }
  });

  var demoTimer = null;
  // A day in the life: charge on the morning sun, coast, then release
  // stored heat through the evening and overnight.
  var STORY = [
    { mode: 'idle',        tod: 'dawn',  wx: 'clear',    outdoor: 6.5,  tank: 41, supply: null, living: 17.5 },
    { mode: 'charging',    tod: 'day',   wx: 'clear',    outdoor: 14.0, tank: 52, supply: 48,   living: 19.5 },
    { mode: 'charging',    tod: 'day',   wx: 'overcast', outdoor: 12.5, tank: 61, supply: 47,   living: 20.5 },
    { mode: 'idle',        tod: 'dusk',  wx: 'clear',    outdoor: 10.0, tank: 68, supply: null, living: 21.0 },
    { mode: 'discharging', tod: 'night', wx: 'clear',    outdoor: 5.0,  tank: 63, supply: null, living: 21.5 },
    { mode: 'discharging', tod: 'night', wx: 'rain',     outdoor: 3.5,  tank: 55, supply: null, living: 21.0 }
  ];

  function paint(step) {
    state.mode = step.mode;
    state.tod = step.tod;
    state.wx = step.wx;
    state.outdoor = step.outdoor;
    state.sunManual = null;
    applyMode(); applyTOD(); applyOutdoor();
    setTemp('lbl-battery-temp', step.tank, false);
    setTemp('lbl-hp-temp', step.supply, step.supply == null);
    setTemp('lbl-radiators-temp', step.living, false);
    syncButtons();
  }

  function syncButtons() {
    document.querySelectorAll('[data-mode]').forEach(function (b) {
      b.setAttribute('aria-pressed', String(b.dataset.mode === state.mode));
    });
    document.querySelectorAll('[data-tod]').forEach(function (b) {
      b.setAttribute('aria-pressed', String(b.dataset.tod === state.tod));
    });
    document.querySelectorAll('[data-wx]').forEach(function (b) {
      b.setAttribute('aria-pressed', String(b.dataset.wx === state.wx));
    });
  }

  function stopDemo() {
    if (demoTimer) { clearInterval(demoTimer); demoTimer = null; }
  }

  function startDemo() {
    var i = 0;
    paint(STORY[0]);
    demoTimer = setInterval(function () {
      i = (i + 1) % STORY.length;
      paint(STORY[i]);
    }, 5000);
  }

  var userDrove = false;

  if (standalone) {
    document.body.classList.add('standalone');
    // Controls are opt-in; the default embed is a hands-off cycle.
    if (params.get('controls') === '1') document.body.classList.add('show-controls');

    document.getElementById('controls').addEventListener('click', function (e) {
      var b = e.target.closest('.ctl-btn');
      if (!b) return;
      userDrove = true;
      stopDemo();                       // visitor takes the wheel (controls mode only)
      if (b.dataset.mode) { state.mode = b.dataset.mode; applyMode(); }
      if (b.dataset.tod)  { state.tod = b.dataset.tod; state.sunManual = null; applyTOD(); }
      if (b.dataset.wx)   { state.wx = b.dataset.wx; applyWX(); }
      syncButtons();
    });

    // Pause the loop while the frame is off-screen — no point animating
    // a scene nobody is looking at.
    if ('IntersectionObserver' in window) {
      new IntersectionObserver(function (entries) {
        entries.forEach(function (en) {
          if (!en.isIntersecting) { stopDemo(); }
          else if (!demoTimer && !heardFromBridge && !userDrove) { startDemo(); }
        });
      }, { threshold: 0.15 }).observe(document.querySelector('.svg-wrap'));
    }

    // Respect a visitor who prefers less motion: show a representative
    // frame instead of looping.
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      paint(STORY[1]);
    } else {
      startDemo();
    }
  }
})();
</script>
</body>
