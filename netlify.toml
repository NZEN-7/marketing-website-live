# Thermal Dawn — Netlify deploy config
# Drag-and-drop this whole site-v2 folder into Netlify, or `netlify deploy`.

[build]
  publish = "."

# Caching: images/fonts are long-lived; css/js/animations are NOT hashed
# filenames, so they get a short cache (a year-long cache on style.css
# once served users a stale stylesheet for a day). Bump ?v= on references
# when editing css/js as a belt-and-braces cache buster.
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/assets/animations/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Basic security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

